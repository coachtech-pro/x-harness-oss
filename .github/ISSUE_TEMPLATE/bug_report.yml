name: 🐛 バグ報告
description: 想定外の挙動・エラーを報告する
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        ご報告ありがとうございます。再現に必要な情報を教えてください。

  - type: textarea
    id: summary
    attributes:
      label: 概要
      description: 何が起きたかを 1〜2 行で
      placeholder: 例) /api/posts/history にアクセスすると 500 が返る
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 再現手順
      description: 最小の再現手順を箇条書きで
      placeholder: |
        1. 〜にアクセスする
        2. 〜のボタンを押す
        3. エラーが表示される
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期待する挙動
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 実際の挙動
      description: エラーメッセージ、スタックトレース、`wrangler tail` のログ等があれば貼り付けてください
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: 影響範囲
      description: 該当する箇所をすべて選択
      multiple: true
      options:
        - Worker (apps/worker)
        - 管理画面 (apps/web)
        - DB / マイグレーション (packages/db)
        - SDK (packages/sdk)
        - X API ラッパー (packages/x-sdk)
        - MCP サーバー (packages/mcp)
        - CLI セットアップ (packages/create-x-harness)
        - 共有型定義 (packages/shared)
        - ドキュメント / README
        - CI / GitHub Actions
        - その他
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: バージョン / コミット
      description: 該当バージョンまたは git commit hash
      placeholder: 例) main @ 866fccf, v0.13.0
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: 環境情報
      description: |
        例: OS / Node / pnpm / wrangler / ブラウザのバージョン
      placeholder: |
        - OS: macOS 15.0
        - Node: 20.x
        - pnpm: 9.15.4
        - wrangler: 4.77.0
        - ブラウザ: Chrome 130
    validations:
      required: false

  - type: textarea
    id: notes
    attributes:
      label: 備考
      description: スクリーンショット、関連 Issue・PR、検証済みの仮説など
    validations:
      required: false
